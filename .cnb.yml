"**":
  pull_request:
    - &verify_pipeline
      name: verify
      git:
        submodules: false
      runner:
        cpus: 8
      docker:
        image: ghcr.io/cirruslabs/flutter:3.38.7
        volumes:
          - gradle-cache:/root/.gradle:rw
          - pub-cache:/root/.pub-cache:rw
          - android-sdk-ndk:/opt/android-sdk-linux/ndk:rw
          - android-sdk-licenses:/opt/android-sdk-linux/licenses:rw
          - android-sdk-cmake:/opt/android-sdk-linux/cmake:rw
      env:
        JAVA_VERSION: "17"
        FLUTTER_VERSION: "3.38.7"
        NDK_VERSION: "28.2.13676358"
      stages:
        - name: init-submodules
          script: |
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            git submodule update --init third_party/omniinfer
            git -C third_party/omniinfer submodule update --init framework/mnn framework/llama.cpp
        - name: secret-scan
          image: alpine:3.20
          script: |
            apk add --no-cache curl git tar
            GITLEAKS_VERSION=8.28.0
            case "$(uname -m)" in
              x86_64|amd64) GITLEAKS_ARCH=x64 ;;
              aarch64|arm64) GITLEAKS_ARCH=arm64 ;;
              *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
            esac
            curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_${GITLEAKS_ARCH}.tar.gz" \
              | tar -xz -C /usr/local/bin gitleaks
            gitleaks git . --redact --verbose --gitleaks-ignore-path .
        - name: verify
          script: |
            export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/opt/android-sdk-linux}"
            yes | sdkmanager --licenses >/dev/null || true
            if [ ! -d "$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" ]; then
              sdkmanager "ndk;$NDK_VERSION"
            fi
            export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
            export ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
            (
              cd ui
              flutter pub get --enforce-lockfile
              flutter analyze --no-fatal-warnings --no-fatal-infos
            )
            CPU_COUNT="$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 4)"
            if [ "$CPU_COUNT" -ge 8 ]; then
              MAX_WORKERS=8
            elif [ "$CPU_COUNT" -ge 4 ]; then
              MAX_WORKERS=4
            elif [ "$CPU_COUNT" -ge 2 ]; then
              MAX_WORKERS="$CPU_COUNT"
            else
              MAX_WORKERS=2
            fi
            echo "Using Gradle max workers: ${MAX_WORKERS}"
            ./gradlew --no-daemon --parallel --build-cache --max-workers="${MAX_WORKERS}" \
              :app:testDevelopDebugUnitTest \
              :app:assembleDevelopDebug \
              :app:lintDevelopDebug
  push:
    - name: sync-to-github
      git:
        submodules: false
      lock:
        key: github-sync
        wait: false
        cancel-in-progress: true
      stages:
        - name: sync
          imports:
            - https://cnb.cool/o.k/secrets/-/blob/main/sync-env.yml
          script: |
            GITHUB_SYNC_USERNAME="${GIT_USERNAME:-${SECRETS_GIT_USERNAME:-${GITHUB_USERNAME:-}}}"
            GITHUB_SYNC_TOKEN="${GIT_ACCESS_TOKEN:-${SECRETS_GIT_ACCESS_TOKEN:-${SECRETS_GITHUB_TOKEN:-${GITHUB_TOKEN:-}}}}"
            if [ -z "${GITHUB_SYNC_USERNAME:-}" ] || [ -z "${GITHUB_SYNC_TOKEN:-}" ]; then
              echo "GitHub sync credentials are not configured; skipping CNB -> GitHub sync."
              exit 0
            fi
            GITHUB_BASIC_AUTH="$(printf '%s:%s' "${GITHUB_SYNC_USERNAME}" "${GITHUB_SYNC_TOKEN}" | base64 | tr -d '\n')"
            GITHUB_REMOTE_URL="https://github.com/omnimind-ai/OpenOmniBot.git"
            for attempt in 1 2 3; do
              if git -c http.extraheader="Authorization: Basic ${GITHUB_BASIC_AUTH}" -c http.version=HTTP/1.1 \
                push --force "${GITHUB_REMOTE_URL}" "HEAD:refs/heads/${CNB_BRANCH}"; then
                exit 0
              fi
              status=$?
              if [ "$attempt" -eq 3 ]; then
                exit "$status"
              fi
              echo "GitHub sync attempt ${attempt} failed, retrying..."
              sleep $((attempt * 5))
            done

main:
  push:
    - *verify_pipeline

$:
  tag_push:
    - name: release-build
      git:
        submodules: false
      runner:
        cpus: 8
      docker:
        image: ghcr.io/cirruslabs/flutter:3.38.7
        volumes:
          - gradle-cache:/root/.gradle:rw
          - pub-cache:/root/.pub-cache:rw
          - android-sdk-ndk:/opt/android-sdk-linux/ndk:rw
          - android-sdk-licenses:/opt/android-sdk-linux/licenses:rw
          - android-sdk-cmake:/opt/android-sdk-linux/cmake:rw
      env:
        JAVA_VERSION: "17"
        FLUTTER_VERSION: "3.38.7"
        NDK_VERSION: "28.2.13676358"
        GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8 --enable-native-access=ALL-UNNAMED
      stages:
        - name: init-submodules
          script: |
            git config --global url."https://github.com/".insteadOf "git@github.com:"
            git submodule update --init third_party/omniinfer
            git -C third_party/omniinfer submodule update --init framework/mnn framework/llama.cpp
        - name: build-release
          imports:
            - https://cnb.cool/o.k/secrets/-/blob/main/omnibot-release.yml
          script: |
            get_var() {
              eval "printf '%s' \"\${$1:-}\""
            }
            RELEASE_STORE_PASSWORD_VALUE=""
            RELEASE_KEY_PASSWORD_VALUE=""
            RELEASE_KEY_ALIAS_VALUE=""
            RELEASE_KEYSTORE_VALUE=""
            RELEASE_STORE_PASSWORD_SOURCE=""
            RELEASE_KEY_PASSWORD_SOURCE=""
            RELEASE_KEY_ALIAS_SOURCE=""
            RELEASE_KEYSTORE_SOURCE=""
            RELEASE_KEYSTORE_CANDIDATES="
            SECRETS_RELEASE_KEYSTORE
            SECRETS_RELEASEKEYSTORE
            RELEASE_KEYSTORE
            "
            RELEASE_STORE_PASSWORD_CANDIDATES="
            SECRETS_RELEASE_PASSWORD
            SECRETS_RELEASE_STORE_PASSWORD
            SECRETS_RELEASE_STORE_PWD
            RELEASE_PASSWORD
            RELEASE_STORE_PASSWORD
            RELEASE_STORE_PWD
            "
            RELEASE_KEY_ALIAS_CANDIDATES="
            SECRETS_RELEASE_KEY_ALIAS
            SECRETS_RELEASEKEYALIAS
            RELEASE_KEY_ALIAS
            "
            RELEASE_KEY_PASSWORD_CANDIDATES="
            SECRETS_RELEASE_KEY_PASSWORD
            SECRETS_RELEASE_KEY_PWD
            RELEASE_KEY_PASSWORD
            RELEASE_KEY_PWD
            "
            for keystore_candidate in $RELEASE_KEYSTORE_CANDIDATES; do
              candidate_keystore_value="$(get_var "$keystore_candidate")"
              if [ -z "$candidate_keystore_value" ]; then
                continue
              fi
              if ! printf '%s' "$candidate_keystore_value" | base64 -d > "$CNB_BUILD_WORKSPACE/release.jks" 2>/dev/null; then
                echo "Unable to decode candidate release keystore from ${keystore_candidate}" >&2
                rm -f "$CNB_BUILD_WORKSPACE/release.jks"
                continue
              fi
              for store_password_candidate in $RELEASE_STORE_PASSWORD_CANDIDATES; do
                candidate_store_password_value="$(get_var "$store_password_candidate")"
                if [ -z "$candidate_store_password_value" ]; then
                  continue
                fi
                for key_alias_candidate in $RELEASE_KEY_ALIAS_CANDIDATES; do
                  candidate_key_alias_value="$(get_var "$key_alias_candidate")"
                  if [ -z "$candidate_key_alias_value" ]; then
                    continue
                  fi
                  if keytool -list -keystore "$CNB_BUILD_WORKSPACE/release.jks" -storepass "$candidate_store_password_value" -alias "$candidate_key_alias_value" >/dev/null 2>&1; then
                    RELEASE_KEYSTORE_SOURCE="$keystore_candidate"
                    RELEASE_STORE_PASSWORD_SOURCE="$store_password_candidate"
                    RELEASE_KEY_ALIAS_SOURCE="$key_alias_candidate"
                    RELEASE_KEYSTORE_VALUE="$candidate_keystore_value"
                    RELEASE_STORE_PASSWORD_VALUE="$candidate_store_password_value"
                    RELEASE_KEY_ALIAS_VALUE="$candidate_key_alias_value"
                    break 3
                  fi
                done
              done
            done
            if [ -z "${RELEASE_STORE_PASSWORD_VALUE:-}" ] || [ -z "${RELEASE_KEY_ALIAS_VALUE:-}" ] || [ -z "${RELEASE_KEYSTORE_VALUE:-}" ]; then
              echo "release signing secrets are missing or invalid in omnibot-release.yml" >&2
              echo "Checked keystore candidates: ${RELEASE_KEYSTORE_CANDIDATES}" >&2
              echo "Checked password candidates: ${RELEASE_STORE_PASSWORD_CANDIDATES}" >&2
              echo "Checked alias candidates: ${RELEASE_KEY_ALIAS_CANDIDATES}" >&2
              exit 1
            fi
            for key_password_candidate in $RELEASE_KEY_PASSWORD_CANDIDATES; do
              candidate_key_password_value="$(get_var "$key_password_candidate")"
              if [ -n "$candidate_key_password_value" ]; then
                RELEASE_KEY_PASSWORD_SOURCE="$key_password_candidate"
                RELEASE_KEY_PASSWORD_VALUE="$candidate_key_password_value"
                break
              fi
            done
            if [ -z "${RELEASE_KEY_PASSWORD_VALUE:-}" ]; then
              RELEASE_KEY_PASSWORD_SOURCE="$RELEASE_STORE_PASSWORD_SOURCE"
              RELEASE_KEY_PASSWORD_VALUE="$RELEASE_STORE_PASSWORD_VALUE"
            fi
            export ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-/opt/android-sdk-linux}"
            yes | sdkmanager --licenses >/dev/null || true
            if [ ! -d "$ANDROID_SDK_ROOT/ndk/$NDK_VERSION" ]; then
              sdkmanager "ndk;$NDK_VERSION"
            fi
            export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
            export ANDROID_NDK_ROOT="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
            (
              cd ui
              flutter pub get --enforce-lockfile
            )
            printf 'Using release signing secrets: keystore=%s store_password=%s alias=%s key_password=%s\n' \
              "$RELEASE_KEYSTORE_SOURCE" "$RELEASE_STORE_PASSWORD_SOURCE" "$RELEASE_KEY_ALIAS_SOURCE" "$RELEASE_KEY_PASSWORD_SOURCE"
            CPU_COUNT="$(getconf _NPROCESSORS_ONLN 2>/dev/null || nproc 2>/dev/null || echo 4)"
            if [ "$CPU_COUNT" -ge 8 ]; then
              MAX_WORKERS=8
            elif [ "$CPU_COUNT" -ge 4 ]; then
              MAX_WORKERS=4
            elif [ "$CPU_COUNT" -ge 2 ]; then
              MAX_WORKERS="$CPU_COUNT"
            else
              MAX_WORKERS=2
            fi
            echo "Using Gradle max workers: ${MAX_WORKERS}"
            ./gradlew --no-daemon --build-cache --max-workers="${MAX_WORKERS}" assembleProductionRelease \
              -POMNI_RELEASE_STORE_FILE="$CNB_BUILD_WORKSPACE/release.jks" \
              -POMNI_RELEASE_STORE_PWD="$RELEASE_STORE_PASSWORD_VALUE" \
              -POMNI_RELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS_VALUE" \
              -POMNI_RELEASE_KEY_PWD="$RELEASE_KEY_PASSWORD_VALUE"
            RELEASE_DIR="app/build/outputs/apk/production/release"
            SAFE_REF_NAME="$(printf '%s' "$CNB_BRANCH" | sed 's#[^A-Za-z0-9._-]#-#g')"
            RELEASE_APK_NAME="OpenOmniBot-${SAFE_REF_NAME}.apk"
            sha256sum "${RELEASE_DIR}/app-production-release.apk" > "${RELEASE_DIR}/app-production-release.apk.sha256"
            mv "${RELEASE_DIR}/app-production-release.apk" "${RELEASE_DIR}/${RELEASE_APK_NAME}"
            mv "${RELEASE_DIR}/app-production-release.apk.sha256" "${RELEASE_DIR}/${RELEASE_APK_NAME}.sha256"
        - name: create-release
          jobs:
            - name: publish-release
              type: git:release
              options:
                tag: $CNB_BRANCH
                description: Automated release build for $CNB_BRANCH
        - name: sync-tag-to-github
          imports:
            - https://cnb.cool/o.k/secrets/-/blob/main/sync-env.yml
          script: |
            GITHUB_SYNC_USERNAME="${GIT_USERNAME:-${SECRETS_GIT_USERNAME:-${GITHUB_USERNAME:-}}}"
            GITHUB_SYNC_TOKEN="${GIT_ACCESS_TOKEN:-${SECRETS_GIT_ACCESS_TOKEN:-${SECRETS_GITHUB_TOKEN:-${GITHUB_TOKEN:-}}}}"
            if [ -z "${GITHUB_SYNC_USERNAME:-}" ] || [ -z "${GITHUB_SYNC_TOKEN:-}" ]; then
              echo "GitHub sync credentials are not configured; skipping CNB tag -> GitHub sync."
              exit 0
            fi
            GITHUB_BASIC_AUTH="$(printf '%s:%s' "${GITHUB_SYNC_USERNAME}" "${GITHUB_SYNC_TOKEN}" | base64 | tr -d '\n')"
            GITHUB_REMOTE_URL="https://github.com/omnimind-ai/OpenOmniBot.git"
            for attempt in 1 2 3; do
              if git -c http.extraheader="Authorization: Basic ${GITHUB_BASIC_AUTH}" -c http.version=HTTP/1.1 \
                push --force "${GITHUB_REMOTE_URL}" "refs/tags/${CNB_BRANCH}:refs/tags/${CNB_BRANCH}"; then
                exit 0
              fi
              status=$?
              if [ "$attempt" -eq 3 ]; then
                exit "$status"
              fi
              echo "GitHub tag sync attempt ${attempt} failed, retrying..."
              sleep $((attempt * 5))
            done
